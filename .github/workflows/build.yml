name: Build Godot

on:
  push:
    branches: [ main, master ]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "Windows Desktop"
            out: windows
          - platform: "Linux"
            out: linux
          - platform: "Web"
            out: web

    steps:
      - uses: actions/checkout@v4

      - name: Download Godot
        run: |
          wget https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip
          unzip Godot_v4.2.2-stable_linux.x86_64.zip
          mv Godot_v4.2.2-stable_linux.x86_64 godot

      - name: Setup export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable
          wget https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz
          unzip Godot_v4.2.2-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.2.2.stable/

      - name: Export
        run: |
          mkdir -p build/${{ matrix.out }}
          # Dynamická koncovka: Web potřebuje index.html, ostatní ne
          if [ "${{ matrix.out }}" == "web" ]; then
            ./godot --headless --export-release "${{ matrix.platform }}" "build/${{ matrix.out }}/index.html"
          else
            # Pro Windows/Linux vytvoříme název podle platformy (např. game.exe)
            ./godot --headless --export-release "${{ matrix.platform }}" "build/${{ matrix.out }}/game"
          fi
      
      - name: Upload to Itch
        # ODSTRANĚNO 'if: matrix.platform == Web', aby to nahrálo všechno
        uses: manleydev/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.ITCH_IO_CREDENTIALS }}
          # Dynamický kanál: pro web bude 'html5', pro ostatní 'windows' nebo 'linux'
          CHANNEL: ${{ matrix.out == 'web' && 'html5' || matrix.out }}
          ITCH_GAME: "over-the-top"
          ITCH_USER: "bedoyaf"
          PACKAGE: build/${{ matrix.out }}

      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.out }}  # Použije např. "build-windows" (zabrání mezerám)
          path: build/${{ matrix.out }}  # Bude hledat ve správné složce (např. "build/windows")
