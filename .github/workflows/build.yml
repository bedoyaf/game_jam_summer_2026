name: Build Godot
on:
  push:
    branches: [ main, master ]

env:
  # Tímto umlčíš varování o Node.js 20 a vynutíš Node 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "Windows Desktop"
            out: windows
            file: game.exe
            itch_channel: windows
          - platform: "Linux"
            out: linux
            file: game.x86_64
            itch_channel: linux
          - platform: "Web"
            out: web
            file: index.html
            itch_channel: html5

    steps:
      - uses: actions/checkout@v4

      - name: Download Godot
        run: |
          wget https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip
          unzip Godot_v4.2.2-stable_linux.x86_64.zip
          mv Godot_v4.2.2-stable_linux.x86_64 godot

      - name: Setup export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable
          wget https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz
          unzip Godot_v4.2.2-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.2.2.stable/

      - name: Export
        run: |
          mkdir -p build/${{ matrix.out }}
          ./godot --headless --export-release "${{ matrix.platform }}" "build/${{ matrix.out }}/${{ matrix.file }}"

      # Nahrání na itch.io (nyní pro všechny platformy automaticky)
      - name: Upload to Itch.io
        uses: manleydev/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.ITCH_IO_CREDENTIALS }}
          CHANNEL: ${{ matrix.itch_channel }}
          ITCH_GAME: "tvoje-jmeno-hry"   # <--- TADY DOPLŇ URL NÁZEV HRY
          ITCH_USER: "tvoje-itch-jmeno" # <--- TADY DOPLŇ SVOJE ITCH JMÉNO
          PACKAGE: build/${{ matrix.out }}

      # Artefakty pro GitHub (pro kontrolu)
      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.out }}
          path: build/${{ matrix.out }}
